<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Time Savr – Connecting…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #121212;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .icon { font-size: 48px; color: #1DB954; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 20px; font-weight: 700; }
    p { color: #a0a0a0; font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">♫</div>
    <h1>Connecting to Spotify…</h1>
    <p id="status">Sending your login back to the extension…</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
 
    if (error) {
      document.getElementById('status').textContent = 'Login cancelled.';
    } else if (code) {
      // Send the code to the extension via postMessage
      // The extension's background listens on tabs
      if (typeof browser !== 'undefined') {
        browser.runtime.sendMessage({ type: 'SPOTIFY_CODE', code });
      }
 
      // Also try chrome namespace (Firefox supports both)
      if (typeof chrome !== 'undefined' && chrome.runtime) {
        chrome.runtime.sendMessage({ type: 'SPOTIFY_CODE', code });
      }
 
      document.getElementById('status').textContent = 'Done! You can close this tab.';
 
      // Auto close after 2s
      setTimeout(() => window.close(), 2000);
    } else {
      document.getElementById('status').textContent = 'No code found — something went wrong.';
    }
  </script>
</body>
</html>
