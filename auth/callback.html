<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title></title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #121212; }
  </style>
</head>
<body>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      localStorage.setItem('spotify_auth_code', code);
      setTimeout(() => window.close(), 1500);
    }
  </script>
</body>
</html>
